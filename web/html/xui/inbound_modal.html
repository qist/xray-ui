{{define "inboundModal"}}
<a-modal id="inbound-modal" v-model="inModal.visible" :title="inModal.title" @ok="inModal.ok"
    :confirm-loading="inModal.confirmLoading" :closable="true" :mask-closable="false" :ok-text="inModal.okText"
    cancel-text='{{ i18n "close" }}'>
    {{template "form/inbound"}}
</a-modal>
<script>

    const inModal = {
        title: '',
        visible: false,
        confirmLoading: false,
        okText: '确定',
        confirm: null,
        inbound: new Inbound(),
        dbInbound: new DBInbound(),
        ok() {
            ObjectUtil.execute(inModal.confirm, inModal.inbound, inModal.dbInbound);
        },
        show({ title = '', okText = '确定', inbound = null, dbInbound = null, confirm = (inbound, dbInbound) => { } }) {
            this.title = title;
            this.okText = okText;
            if (inbound) {
                this.inbound = Inbound.fromJson(inbound.toJson());
            } else {
                this.inbound = new Inbound();
            }
            if (dbInbound) {
                this.dbInbound = new DBInbound(dbInbound);
            } else {
                this.dbInbound = new DBInbound();
            }
            this.confirm = confirm;
            this.visible = true;
        },
        close() {
            inModal.visible = false;
            inModal.loading(false);
        },
        loading(loading) {
            inModal.confirmLoading = loading;
        },
        // Vision Seed methods - always available regardless of Vue context
        updateTestseed(index, value) {
            // Use inModal.inbound explicitly to ensure correct context
            if (!inModal.inbound || !inModal.inbound.settings) return;
            // Ensure testseed is initialized
            if (!inModal.inbound.settings.testseed || !Array.isArray(inModal.inbound.settings.testseed)) {
                inModal.inbound.settings.testseed = [900, 500, 900, 256];
            }
            // Ensure array has enough elements
            while (inModal.inbound.settings.testseed.length <= index) {
                inModal.inbound.settings.testseed.push(0);
            }
            // Update value
            inModal.inbound.settings.testseed[index] = value;
        },
        setRandomTestseed() {
            // Use inModal.inbound explicitly to ensure correct context
            if (!inModal.inbound || !inModal.inbound.settings) return;
            // Ensure testseed is initialized
            if (!inModal.inbound.settings.testseed || !Array.isArray(inModal.inbound.settings.testseed) || inModal.inbound.settings.testseed.length < 4) {
                inModal.inbound.settings.testseed = [900, 500, 900, 256].slice();
            }
            // Create new array with random values
            inModal.inbound.settings.testseed = [Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000)];
        },
        resetTestseed() {
            // Use inModal.inbound explicitly to ensure correct context
            if (!inModal.inbound || !inModal.inbound.settings) return;
            // Reset testseed to default values
            inModal.inbound.settings.testseed = [900, 500, 900, 256].slice();
        },
    };

    const protocols = {
        VMESS: Protocols.VMESS,
        VLESS: Protocols.VLESS,
        TROJAN: Protocols.TROJAN,
        HYSTERIA: Protocols.HYSTERIA,
        SHADOWSOCKS: Protocols.SHADOWSOCKS,
        DOKODEMO: Protocols.DOKODEMO,
        SOCKS: Protocols.SOCKS,
        HTTP: Protocols.HTTP,
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#inbound-modal',
        data: {
            inModal: inModal,
            Protocols: protocols,
            SSMethods: SSMethods,
            get inbound() {
                return inModal.inbound;
            },
            get dbInbound() {
                return inModal.dbInbound;
            }
        },
        methods: {
            streamNetworkChange(oldValue) {
                if (oldValue === 'kcp') {
                    this.inModal.inbound.tls = false;
                }
                if (oldValue === 'hysteria') {
                    this.inModal.inbound.reality = false;
                    this.inModal.inbound.tls = true;
                }
                if (this.inModal.inbound.protocol === Protocols.VLESS && ['tcp', 'raw'].indexOf(oldValue) === -1) {
                    this.inModal.inbound.authentication = false;
                }
            },

            toggleVlessAuthentication(enabled) {
                if (!enabled) {
                    this.inbound.authentication = false;
                    return;
                }
                this.inbound.authentication = true;
                this.getNewVlessEnc();
            },

            async getNewX25519Cert() {
                inModal.loading(true);
                axios.post('server/xraysecretkey')
                    .then((res) => {
                        inModal.loading(false);

                        if (!res.data.success) {
                            return;
                        }
                        inModal.inbound.stream.reality.privateKey = res.data.obj.key;
                        inModal.inbound.stream.reality.publicKey = res.data.obj.value;
                    })
                    .catch((error) => {
                        inModal.loading(false);
                        console.error("Error fetching the X25519 cert:", error);
                    });
            },

            async getNewMLDSA65Cert() {
                inModal.loading(true);
                axios.post('server/mldsa65secretkey')
                    .then((res) => {
                        inModal.loading(false);

                        if (!res.data.success) {
                            return;
                        }
                        // 存储在 inbound.signature，可按你实际字段结构调整

                        inModal.inbound.stream.reality.mldsa65Seed = res.data.obj.key;
                        inModal.inbound.stream.reality.mldsa65Verify = res.data.obj.value;
                    })
                    .catch((error) => {
                        inModal.loading(false);
                        console.error("Error fetching the ML-DSA-65 cert:", error);
                    });
            },
            async getNewEchCert() {
                inModal.loading(true);
                const msg = await HttpUtil.post('server/getNewEchCert', { sni: inModal.inbound.stream.tls.sni });
                inModal.loading(false);
                if (!msg.success) {
                    return;
                }
                inModal.inbound.stream.tls.echServerKeys = msg.obj.echServerKeys;
                inModal.inbound.stream.tls.settings[0].echConfigList = msg.obj.echConfigList;
            },
            clearEchCert() {
                this.inbound.stream.tls.echServerKeys = '';
                this.inbound.stream.tls.settings[0].echConfigList = '';
            },
            async getNewVlessEnc() {
                inModal.loading(true);
                const msg = await HttpUtil.get('server/getNewVlessEnc');
                inModal.loading(false);

                if (!msg.success) {
                    return;
                }

                const auths = msg.obj.auths || [];
                const selected = inModal.inbound.settings.selectedAuth;
                const block = auths.find(a => a.label === selected);

                if (!block) {
                    console.error("No auth block for", selected);
                    return;
                }

                inModal.inbound.settings.decryption = block.decryption;
                inModal.inbound.settings.encryption = block.encryption;
            },
            // 原注释保留不变
            // async getNewX25519Cert() {
            //     inModal.loading(true);
            //     const msg = await HttpUtil.post('/server/xraysecretkey');
            //     inModal.loading(false);
            //     if (!msg.success) {
            //         return;
            //     }
            //     inModal.inbound.stream.reality.privateKey = msg.obj.key;
            //     inModal.inbound.stream.reality.publicKey = msg.obj.value;
            // }
            // Vision Seed methods - must be in Vue methods for proper binding
            updateTestseed(index, value) {
                // Ensure testseed is initialized
                if (!this.inbound.settings.testseed || !Array.isArray(this.inbound.settings.testseed)) {
                    this.$set(this.inbound.settings, 'testseed', [900, 500, 900, 256]);
                }
                // Ensure array has enough elements
                while (this.inbound.settings.testseed.length <= index) {
                    this.inbound.settings.testseed.push(0);
                }
                // Update value using Vue.set for reactivity
                this.$set(this.inbound.settings.testseed, index, value);
            },
            setRandomTestseed() {
                // Create new array with random values and use Vue.set for reactivity
                const newSeed = [Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000), Math.floor(Math.random() * 1000)];
                this.$set(this.inbound.settings, 'testseed', newSeed);
            },
            resetTestseed() {
                // Reset testseed to default values using Vue.set for reactivity
                this.$set(this.inbound.settings, 'testseed', [900, 500, 900, 256]);
            }
        },

    });

</script>
{{end}}
