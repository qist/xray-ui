{{define "form/streamHysteria"}}
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
    <a-form-item label="Version">
        <a-input-number v-model.number="inbound.stream.hysteria.version" :min="2" :max="2"></a-input-number>
    </a-form-item>
    <a-form-item>
        <span slot="label">
            Auth
            <a-tooltip>
                <template slot="title">
                    需与客户端保持一致
                </template>
                <a-icon type="question-circle" theme="filled"></a-icon>
            </a-tooltip>
        </span>
        <a-input-group compact style="display: flex; width: 100%;">
            <a-input v-model.trim="inbound.stream.hysteria.auth" style="width: 75%"></a-input>
            <a-button size="small" style="width: 25%" @click="inbound.stream.hysteria.refreshAuth()">
                更换
            </a-button>
        </a-input-group>
    </a-form-item>
    <a-form-item label="UDP Idle Timeout">
        <a-input-number v-model.number="inbound.stream.hysteria.udpIdleTimeout" :min="1"></a-input-number>
    </a-form-item>
    <a-form-item label="端口跳跃">
        <a-switch v-model="inbound.stream.hysteria.portHopping.enabled"></a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.portHopping.enabled" label="目标端口">
        <a-input-number v-model.number="inbound.port" :min="1" :max="65535"></a-input-number>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.portHopping.enabled" label="范围模式">
        <a-select v-model="inbound.stream.hysteria.portHopping.mode"
                  style="width: 180px;"
                  @change="inbound.stream.hysteria.portHopping.syncPorts()">
            <a-select-option value="preset">预设</a-select-option>
            <a-select-option value="manual">手动</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.portHopping.enabled && inbound.stream.hysteria.portHopping.mode === 'preset'" label="端口范围">
        <a-select v-model="inbound.stream.hysteria.portHopping.preset"
                  style="width: 220px;"
                  @change="inbound.stream.hysteria.portHopping.syncPorts()">
            <a-select-option value="10000-20000">10000-20000</a-select-option>
            <a-select-option value="20000-50000">20000-50000</a-select-option>
            <a-select-option value="30000-60000">30000-60000</a-select-option>
            <a-select-option value="40000-65000">40000-65000</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.portHopping.enabled && inbound.stream.hysteria.portHopping.mode === 'manual'">
        <span slot="label">
            端口范围
            <a-tooltip>
                <template slot="title">
                    格式示例: 20000-50000
                </template>
                <a-icon type="question-circle" theme="filled"></a-icon>
            </a-tooltip>
        </span>
        <a-input v-model.trim="inbound.stream.hysteria.portHopping.ports" placeholder="20000-50000"></a-input>
    </a-form-item>
    <a-form-item>
        <span slot="label">
            Masquerade Type
            <a-tooltip>
                <template slot="title">
                    留空时使用默认 404 页面
                </template>
                <a-icon type="question-circle" theme="filled"></a-icon>
            </a-tooltip>
        </span>
        <a-select v-model="inbound.stream.hysteria.masquerade.type">
            <a-select-option value="">默认</a-select-option>
            <a-select-option value="file">file</a-select-option>
            <a-select-option value="proxy">proxy</a-select-option>
            <a-select-option value="string">string</a-select-option>
        </a-select>
    </a-form-item>

    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'file'" label="Dir">
        <a-input v-model.trim="inbound.stream.hysteria.masquerade.dir"></a-input>
    </a-form-item>

    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'proxy'" label="URL">
        <a-input v-model.trim="inbound.stream.hysteria.masquerade.url"></a-input>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'proxy'" label="Rewrite Host">
        <a-switch v-model="inbound.stream.hysteria.masquerade.rewriteHost"></a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'proxy'" label="Insecure">
        <a-switch v-model="inbound.stream.hysteria.masquerade.insecure"></a-switch>
    </a-form-item>

    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'string'" label="Status Code">
        <a-input-number v-model.number="inbound.stream.hysteria.masquerade.statusCode" :min="0"></a-input-number>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'string'" label="Content">
        <a-input v-model.trim="inbound.stream.hysteria.masquerade.content"></a-input>
    </a-form-item>
    <a-form-item v-if="inbound.stream.hysteria.masquerade.type === 'string'" label="Headers">
        <a-row>
            <a-button size="small" @click="inbound.stream.hysteria.masquerade.addHeader('', '')">
                +
            </a-button>
        </a-row>
        <a-input-group v-for="(header, index) in inbound.stream.hysteria.masquerade.headers">
            <a-input style="width: 50%" v-model.trim="header.name" addon-before="名称"></a-input>
            <a-input style="width: 50%" v-model.trim="header.value" addon-before="值">
                <template slot="addonAfter">
                    <a-button size="small" @click="inbound.stream.hysteria.masquerade.removeHeader(index)">
                        -
                    </a-button>
                </template>
            </a-input>
        </a-input-group>
    </a-form-item>
</a-form>
{{end}}
