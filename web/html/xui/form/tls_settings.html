{{define "form/tlsSettings"}}
<!-- tls enable -->
<a-form layout="inline" v-if="inbound.canSetTls()">
    <a-form-item label="tls">
        <a-switch v-model="inbound.tls" :disabled="inbound.protocol === Protocols.HYSTERIA || inbound.stream.network === 'hysteria'">
        </a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.canEnableReaLITy()">
        <span slot="label">
            reality
            <a-tooltip>
                <template slot="title">
                    1.8.0 及以上版本！
                </template>
                <a-icon type="question-circle" theme="filled"></a-icon>
            </a-tooltip>
        </span>
        <a-switch v-model="inbound.reality"></a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.canEnableAuthentication()" label="decryption">
        <a-switch v-model="inbound.authentication" @change="toggleVlessAuthentication"></a-switch>
    </a-form-item>
</a-form>

<!-- tls settings -->
<a-form v-if="inbound.tls" layout="inline">
    <a-form-item label="SNI">
        <a-input v-model.trim="inbound.stream.tls.sni"></a-input>
    </a-form-item>
    <a-form-item label="rejectUnknownSni">
        <a-switch v-model="inbound.stream.tls.rejectUnknownSni">
            <!-- <a-select-option :value="false">false</a-select-option>
            <a-select-option :value="true">true</a-select-option> -->
        </a-switch>
    </a-form-item>
    <a-form-item>
        <span slot="label">
            CipherSuites
            <a-tooltip>
                <template slot="title">
                    默认 auto 如果选择其它加密方式记得删除 auto 选项 加密方式可以多选！
                </template>
                <a-icon type="question-circle" theme="filled"></a-icon>
            </a-tooltip>
        </span>
        <a-select v-model="inbound.stream.tls.cipherSuites" mode="multiple" style="width: 350px">
            <a-select-option value="">auto</a-select-option>
            <a-select-option v-for="key in TLS_CIPHER_OPTION" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="MinVersion">
        <a-select v-model="inbound.stream.tls.minVersion" style="width: 60px"
            :dropdown-class-name="siderDrawer.isDarkTheme ? 'ant-card-dark' : ''">
            <a-select-option v-for="key in TLS_VERSION_OPTION" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="MaxVersion">
        <a-select v-model="inbound.stream.tls.maxVersion" style="width: 60px"
            :dropdown-class-name="siderDrawer.isDarkTheme ? 'ant-card-dark' : ''">
            <a-select-option v-for="key in TLS_VERSION_OPTION" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="uTLS" v-if="inbound.tls">
        <a-select v-model="inbound.stream.tls.settings[0].fingerprint" style="width: 135px">
            <a-select-option value=''>None</a-select-option>
            <a-select-option v-for="key in UTLS_FINGERPRINT" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="ALPN">
        <a-select v-model="inbound.stream.tls.alpn" mode="multiple" style="width: 200px"
            :dropdown-class-name="siderDrawer.isDarkTheme ? 'ant-card-dark' : ''">
            <a-select-option v-for="key in ALPN_OPTION" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="ECH Server Keys">
        <a-input type="textarea" :rows="2" v-model="inbound.stream.tls.echServerKeys"></a-input>
    </a-form-item>
    <a-form-item label="ECH Force Query">
        <a-select v-model="inbound.stream.tls.echForceQuery" style="width: 100px"
            :dropdown-class-name="siderDrawer.isDarkTheme ? 'ant-card-dark' : ''">
            <a-select-option value="none">none</a-select-option>
            <a-select-option value="half">half</a-select-option>
            <a-select-option value="full">full</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="ECH Config List">
        <a-input type="textarea" :rows="2" v-model="inbound.stream.tls.settings[0].echConfigList"></a-input>
    </a-form-item>
    <a-form-item label=" ">
        <a-space>
            <a-button type="primary" icon="import" @click="getNewEchCert">Get New ECH Cert</a-button>
            <a-button @click="clearEchCert">Clear</a-button>
        </a-space>
    </a-form-item>
    <a-divider style="margin: 3px 0;"></a-divider>
    <template v-for="(cert, index) in inbound.stream.tls.certs">
        <a-form-item label="证书">
            <a-radio-group v-model="cert.useFile" button-style="solid">
                <a-radio-button :value="true">certificate file path</a-radio-button>
                <a-radio-button :value="false">certificate file content</a-radio-button>
            </a-radio-group>
        </a-form-item>
        <a-form-item label=" ">
            <a-space>
                <a-button icon="plus" v-if="index === 0" type="primary" size="small"
                    @click="inbound.stream.tls.addCert()"></a-button>
                <a-button icon="minus" v-if="inbound.stream.tls.certs.length > 1" type="primary" size="small"
                    @click="inbound.stream.tls.removeCert(index)"></a-button>
            </a-space>
        </a-form-item>
        <a-form-item label="oneTimeLoading">
            <a-switch v-model="cert.oneTimeLoading"></a-switch>
        </a-form-item>
        <a-form-item label="usage">
            <a-select v-model="cert.usage" style="width: 140px"
                :dropdown-class-name="siderDrawer.isDarkTheme ? 'ant-card-dark' : ''">
                <a-select-option v-for="key in USAGE_OPTION" :value="key">[[ key ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label="buildChain" v-if="cert.usage === 'issue'">
            <a-switch v-model="cert.buildChain"></a-switch>
        </a-form-item>
        <template v-if="cert.useFile">
            <a-form-item label="ocspStapling">
                <a-input v-model.number="cert.ocspStapling"></a-input>
            </a-form-item>
            <a-form-item label="公钥文件路径">
                <a-input v-model.trim="cert.certFile"></a-input>
            </a-form-item>
            <a-form-item label="密钥文件路径">
                <a-input v-model.trim="cert.keyFile"></a-input>
            </a-form-item>
        </template>
        <template v-else>
            <a-form-item label="ocspStapling">
                <a-input v-model.number="cert.ocspStapling"></a-input>
            </a-form-item>
            <a-form-item label="公钥内容">
                <a-input type="textarea" :rows="2" v-model="cert.cert"></a-input>
            </a-form-item>
            <a-form-item label="密钥内容">
                <a-input type="textarea" :rows="2" v-model="cert.key"></a-input>
            </a-form-item>
        </template>
    </template>
</a-form>
{{end}}
