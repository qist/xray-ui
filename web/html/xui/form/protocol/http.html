{{define "form/http"}}
<a-form layout="inline">
    <a-form-item label="用户名">
        <a-input v-model.trim="inbound.settings.accounts[0].user"></a-input>
    </a-form-item>
    <a-form-item label="密码">
        <a-input-group compact style="display: flex; width: 320px;">
            <a-input v-model.trim="inbound.settings.accounts[0].pass" style="width: 75%"></a-input>
            <a-button size="small" style="width: 25%" @click="inbound.settings.accounts[0].refreshPassword()">
                更换
            </a-button>
        </a-input-group>
    </a-form-item>
</a-form>
{{end}}
