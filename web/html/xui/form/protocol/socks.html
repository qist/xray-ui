{{define "form/socks"}}
<a-form layout="inline">
    <a-form-item label="密码认证">
        <a-switch :checked="inbound.settings.auth === 'password'"
                  @change="checked => inbound.settings.auth = checked ? 'password' : 'noauth'"></a-switch>
    </a-form-item>
    <template v-if="inbound.settings.auth === 'password'">
        <a-form-item label="用户名">
            <a-input v-model.trim="inbound.settings.accounts[0].user"></a-input>
        </a-form-item>
        <a-form-item label="密码">
            <a-input-group compact style="display: flex; width: 320px;">
                <a-input v-model.trim="inbound.settings.accounts[0].pass" style="width: 75%"></a-input>
                <a-button size="small" style="width: 25%" @click="inbound.settings.accounts[0].refreshPassword()">
                    更换
                </a-button>
            </a-input-group>
        </a-form-item>
    </template>
    <a-form-item label="启用 udp">
        <a-switch v-model="inbound.settings.udp"></a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.settings.udp"
                 label="IP">
        <a-input v-model.trim="inbound.settings.ip"></a-input>
    </a-form-item>
</a-form>
{{end}}
