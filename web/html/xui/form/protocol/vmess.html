{{define "form/vmess"}}
<a-form layout="inline">
    <a-form-item label="id">
        <a-input-group compact style="display: flex; width: 420px;">
            <a-input v-model.trim="inbound.settings.vmesses[0].id" style="width: 75%"></a-input>
            <a-button size="small" style="width: 25%" @click="inbound.settings.vmesses[0].refreshId()">
                更换
            </a-button>
        </a-input-group>
    </a-form-item>
    <a-form-item label="禁用不安全加密">
        <a-switch v-model.number="inbound.settings.disableInsecure"></a-switch>
    </a-form-item>
</a-form>
{{end}}
